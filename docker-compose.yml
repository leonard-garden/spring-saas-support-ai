services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: supportsaas
      POSTGRES_USER: supportsaas
      POSTGRES_PASSWORD: supportsaas
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    ports:
      - "8090:8080"
    depends_on:
      - postgres

  mailhog:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"   # SMTP
      - "8025:8025"   # Web UI

volumes:
  postgres_data:
