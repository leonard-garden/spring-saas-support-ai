spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 22
      minimum-idle: 5
      connection-timeout: 30000
  flyway:
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    com.leonardtrinh.supportsaas: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
