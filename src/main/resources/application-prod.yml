spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
  flyway:
    locations: classpath:db/migration

logging:
  level:
    root: WARN
    com.leonardtrinh.supportsaas: INFO

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
