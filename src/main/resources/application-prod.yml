spring:
  datasource:
    url: ${DATABASE_URL}
    username: ${DATABASE_USERNAME}
    password: ${DATABASE_PASSWORD}
    hikari:
      maximum-pool-size: 5
      minimum-idle: 2
      connection-timeout: 20000
  flyway:
    locations: classpath:db/migration
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

app:
  base-url: ${APP_BASE_URL}
  mail:
    sender: ${MAIL_SENDER:${MAIL_USERNAME}}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:${APP_BASE_URL}}

logging:
  level:
    root: WARN
    com.leonardtrinh.supportsaas: INFO

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
